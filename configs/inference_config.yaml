ner:
  model_path: checkpoints/best
  default_threshold: 0.60
  thresholds:
    person: 0.70
    address: 0.55
    organization: 0.65
    company: 0.65
    school: 0.65
    hospital: 0.65
  window_stride: 64

fusion:
  rule_weight: 1.0
  ner_weight: 0.85
  context_weight: 0.55
  overlap_threshold: 0.5

mapping:
  strategy: ink_refined
  safety_mode: strict
  horizontal_padding: 8
  vertical_padding: 5
  minimum_box_width: 4
  minimum_box_height: 4
  low_confidence_fallback: full_block
  minimum_mapping_confidence: 0.72
  minimum_component_match_ratio: 0.70
  ink_refinement_enabled: true
  projection_refinement_enabled: true
  component_gap_ratio: 0.45
  maximum_overcover_ratio: 0.35

ocr:
  language: ch
  ocr_version: PP-OCRv6

  text_detection_model_name: PP-OCRv6_medium_det
  text_recognition_model_name: PP-OCRv6_medium_rec

  max_image_side: 3200

  text_det_limit_side_len: 3200
  text_det_limit_type: max
  text_det_thresh: 0.25
  text_det_box_thresh: 0.50
  text_det_unclip_ratio: 1.5

  text_rec_score_thresh: 0.0

  use_doc_orientation_classify: false
  use_doc_unwarping: false
  use_textline_orientation: true

  device: cpu
  enable_mkldnn: false
  cpu_threads: 8

  cache_enabled: true
  cache_ttl_seconds: 600
  cache_max_entries: 32
  config_version: 3

redaction:
  default_mode: black
  mosaic_block_size: 10
  blur_kernel_size: 31
