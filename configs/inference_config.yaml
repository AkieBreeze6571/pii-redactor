ner:
  model_path: checkpoints/best
  default_threshold: 0.60
  thresholds:
    person: 0.70
    address: 0.55
    organization: 0.65
    company: 0.65
    school: 0.65
    hospital: 0.65
  window_stride: 64

fusion:
  rule_weight: 1.0
  ner_weight: 0.85
  context_weight: 0.55
  overlap_threshold: 0.5

mapping:
  strategy: ink_refined
  safety_mode: strict
  horizontal_padding: 8
  vertical_padding: 5
  minimum_box_width: 4
  minimum_box_height: 4
  low_confidence_fallback: full_block
  minimum_mapping_confidence: 0.72
  minimum_component_match_ratio: 0.70
  ink_refinement_enabled: true
  projection_refinement_enabled: true
  component_gap_ratio: 0.45
  maximum_overcover_ratio: 0.35

ocr:
  language: ch
  max_image_side: 2400
  use_angle_cls: true
  cache_enabled: true
  config_version: 1

redaction:
  default_mode: black
  mosaic_block_size: 10
  blur_kernel_size: 31
